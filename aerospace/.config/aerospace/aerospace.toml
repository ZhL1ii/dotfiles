# aerospace config

config-version = 2

# 启动与重载
start-at-login = true

# 布局基础设置
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
accordion-padding = 24

# 鼠标跟随当前显示器，外接显示器时更自然
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# JankyBorders and sketchybar
after-startup-command = [
  'exec-and-forget borders style=round width=6.0 hidpi=off active_color=0xff007aff inactive_color=0x00000000',
  'exec-and-forget /opt/homebrew/bin/sketchybar',
]

# sketchybar has a built-in detection of already running process,
# so it won't be run twice on AeroSpace restart

# Notify Sketchybar about workspace change
exec-on-workspace-change = [
  '/bin/bash',
  '-c',
  '/opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE',
]

# 只保留常用 workspace
persistent-workspaces = ['1', '2', '3', 'Q', 'W', 'E']

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 5
inner.vertical = 5
outer.left = 5
outer.right = 5
outer.bottom = 5

outer.top = [
  { monitor."G7u Pro" = 10 },
  { monitor."Built-in Retina Display" = 5 },
  20,
]

# =========================
# 主模式快捷键
# =========================
[mode.main.binding]

# 聚焦窗口：Vim 方向键
alt-h = 'exec-and-forget aerospace focus --boundaries-action fail left || printf "%s\n" 1 2 3 Q W E | aerospace workspace --stdin prev'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'exec-and-forget aerospace focus --boundaries-action fail right || printf "%s\n" 1 2 3 Q W E | aerospace workspace --stdin next'

# 移动窗口
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# 调整布局
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'
alt-f = 'fullscreen'
alt-space = 'layout floating tiling'

# 工作区切换
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-q = 'workspace Q'
alt-w = 'workspace W'
alt-e = 'workspace E'

# 把当前窗口移动到工作区，并跟过去
alt-shift-1 = ['move-node-to-workspace 1', 'workspace 1']
alt-shift-2 = ['move-node-to-workspace 2', 'workspace 2']
alt-shift-3 = ['move-node-to-workspace 3', 'workspace 3']
alt-shift-q = ['move-node-to-workspace Q', 'workspace Q']
alt-shift-w = ['move-node-to-workspace W', 'workspace W']
alt-shift-e = ['move-node-to-workspace E', 'workspace E']

# 回到上一个 workspace
alt-tab = 'workspace-back-and-forth'

# 多显示器：把当前 workspace 移到下一个显示器
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# 进入服务模式
alt-shift-semicolon = 'mode service'


# =========================
# 服务模式
# alt-shift-; 进入，按对应键执行后返回 main
# =========================
[mode.service.binding]

esc = ['reload-config', 'mode main']

# 重载配置
r = ['reload-config', 'mode main']

# 重置当前 workspace 的容器树
backspace = ['flatten-workspace-tree', 'mode main']

# 当前窗口 floating/tiling 切换
f = ['layout floating tiling', 'mode main']

# 关闭除当前窗口外的其它窗口
x = ['close-all-windows-but-current', 'mode main']

# 把窗口合并到某个方向的容器里
h = ['join-with left', 'mode main']
j = ['join-with down', 'mode main']
k = ['join-with up', 'mode main']
l = ['join-with right', 'mode main']

# =========================
# Floating 应用
# =========================
# AeroSpace 支持 on-window-detected，用 app-id / app-name / title 作为条件，
# 然后执行 layout floating / move-node-to-workspace 等命令。
# run 可以是字符串，也可以是命令数组。官方示例也是这么写的。
# https://nikitabobko.github.io/AeroSpace/guide#on-window-detected-callback

# Finder
[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

# 系统设置
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

